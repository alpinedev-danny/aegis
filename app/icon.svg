    <circle cx="120" cy="170" r="16" fill="#00ffcc" filter="url(#glow)"/>
    <path d="M120 186 v24" stroke="#00ffcc" stroke-width="12" stroke-linecap="round" filter="url(#glow)" />
  </g>
